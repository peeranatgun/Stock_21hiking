<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>รายจ่าย — 21Hiking Stock</title>
  <script src="/env.js"></script>
  <link rel="stylesheet" href="style.css"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#1d1d1f"/>
</head>
<body>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><h1>🏔️ 21Hiking Stock</h1><span>Stock Management</span></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">หลัก</div>
      <a class="nav-item" data-page="index.html" href="index.html"><span class="nav-icon">📊</span>Dashboard</a>
      <a class="nav-item" data-page="products.html" href="products.html"><span class="nav-icon">👕</span>สินค้า</a>
      <a class="nav-item" data-page="brands.html" href="brands.html"><span class="nav-icon">🏷️</span>แบรนด์</a>
      <a class="nav-item" data-page="lots.html" href="lots.html"><span class="nav-icon">📦</span>ล็อต</a>
      <div class="nav-section-label">รายการ</div>
      <a class="nav-item" data-page="sales.html" href="sales.html"><span class="nav-icon">💰</span>ยอดขาย</a>
      <a class="nav-item" data-page="expenses.html" href="expenses.html"><span class="nav-icon">🧾</span>รายจ่าย</a>
      <div class="nav-section-label">วิเคราะห์</div>
      <a class="nav-item" data-page="reports.html" href="reports.html"><span class="nav-icon">📈</span>รายงาน</a>
    </nav>
    <div class="sidebar-footer">
      <div style="font-size:12px;color:var(--text-tertiary);margin-bottom:8px;" id="user-email"></div>
      <button class="btn btn-ghost btn-sm" style="width:100%;justify-content:center;" data-logout>ออกจากระบบ</button>
    </div>
  </aside>
  <div class="main-content">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="hamburger" id="hamburger">☰</button>
        <span class="topbar-title">รายจ่าย</span>
      </div>
      <button class="btn btn-primary btn-sm" id="add-expense-btn">+ เพิ่มรายจ่าย</button>
    </header>
    <main class="page-content">
      <div id="total-card" class="stat-card red" style="max-width:240px;margin-bottom:20px;">
        <div class="stat-label">รายจ่ายรวม</div>
        <div class="stat-value" id="total-expense-val">—</div>
      </div>
      <div id="expense-list" class="expense-list"></div>
    </main>
  </div>
</div>

<!-- Expense Modal -->
<div class="modal-overlay" id="expense-modal">
  <div class="modal" style="max-width:400px;">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h2 class="modal-title" id="expense-modal-title">เพิ่มรายจ่าย</h2>
      <button class="modal-close" data-close>✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">รายการ <span style="color:var(--accent-red)">*</span></label>
      <input type="text" id="exp-title" class="form-input" placeholder="เช่น ค่าขนส่ง"/>
    </div>
    <div class="form-group">
      <label class="form-label">จำนวนเงิน (฿) <span style="color:var(--accent-red)">*</span></label>
      <input type="number" id="exp-amount" class="form-input" placeholder="0" min="0"/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close>ยกเลิก</button>
      <button class="btn btn-primary" id="save-expense-btn">บันทึก</button>
    </div>
  </div>
</div>

<!-- Confirm -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal" style="max-width:360px;">
    <div class="modal-handle"></div>
    <div class="confirm-dialog">
      <div class="confirm-icon">⚠️</div>
      <div class="confirm-title">ยืนยัน</div>
      <div class="confirm-desc"></div>
    </div>
    <div class="modal-footer" style="margin-top:20px;">
      <button class="btn btn-ghost" data-close>ยกเลิก</button>
      <button class="btn btn-red" id="confirm-ok">ยืนยัน</button>
    </div>
  </div>
</div>
<div id="toast-container"></div>

<script type="module">
import { initApp, showToast, openModal, closeModal, setupModalClose, formatCurrency, formatDate, confirm } from './app.js';
import { getExpenses, createExpense, updateExpense, deleteExpense } from './expenses.js';
import { getActiveLot } from './lots.js';

setupModalClose('expense-modal');
setupModalClose('confirm-modal');
const session = await initApp();
if (!session) throw new Error('not auth');

let editingId = null;

async function load() {
  const activeLot = await getActiveLot();
  const list = document.getElementById('expense-list');
  list.innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';
  try {
    const expenses = await getExpenses(activeLot?.id || null);
    const total = expenses.reduce((s, e) => s + (e.amount || 0), 0);
    document.getElementById('total-expense-val').textContent = formatCurrency(total);

    if (!expenses.length) {
      list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🧾</div><h3>ยังไม่มีรายจ่าย</h3><p>กด "เพิ่มรายจ่าย" เพื่อเริ่มบันทึก</p></div>`;
      return;
    }
    list.innerHTML = expenses.map(e => `
      <div class="expense-item">
        <div>
          <div class="expense-title">${e.title}</div>
          <div class="expense-date">${formatDate(e.created_at)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="expense-amount text-red">−${formatCurrency(e.amount)}</div>
          <button class="btn btn-ghost btn-sm" onclick="editExpense('${e.id}','${e.title.replace(/'/g,"\\'")}',${e.amount})">แก้ไข</button>
          <button class="btn btn-red btn-sm" onclick="removeExpense('${e.id}','${e.title.replace(/'/g,"\\'")}')">ลบ</button>
        </div>
      </div>
    `).join('');
  } catch (e) {
    list.innerHTML = `<p style="color:var(--accent-red)">${e.message}</p>`;
  }
}

document.getElementById('add-expense-btn').addEventListener('click', () => {
  editingId = null;
  document.getElementById('expense-modal-title').textContent = 'เพิ่มรายจ่าย';
  document.getElementById('exp-title').value = '';
  document.getElementById('exp-amount').value = '';
  openModal('expense-modal');
});

window.editExpense = (id, title, amount) => {
  editingId = id;
  document.getElementById('expense-modal-title').textContent = 'แก้ไขรายจ่าย';
  document.getElementById('exp-title').value = title;
  document.getElementById('exp-amount').value = amount;
  openModal('expense-modal');
};

document.getElementById('save-expense-btn').addEventListener('click', async () => {
  const title = document.getElementById('exp-title').value.trim();
  const amount = parseFloat(document.getElementById('exp-amount').value);
  if (!title) { showToast('กรุณากรอกรายการ', 'warning'); return; }
  if (!amount || amount <= 0) { showToast('กรุณากรอกจำนวนเงิน', 'warning'); return; }
  const btn = document.getElementById('save-expense-btn');
  btn.disabled = true;
  try {
    if (editingId) {
      await updateExpense(editingId, { title, amount });
      showToast('แก้ไขรายจ่ายสำเร็จ');
    } else {
      const activeLot = await getActiveLot();
      await createExpense({ title, amount, lot_id: activeLot?.id || null });
      showToast('เพิ่มรายจ่ายสำเร็จ');
    }
    closeModal('expense-modal');
    load();
  } catch (e) { showToast(e.message, 'error'); }
  finally { btn.disabled = false; }
});

window.removeExpense = (id, title) => {
  confirm({
    icon: '🗑️', title: 'ลบรายจ่าย', desc: `ลบ "${title}" ใช่ไหม?`,
    onConfirm: async () => {
      try { await deleteExpense(id); showToast('ลบรายจ่ายแล้ว'); load(); }
      catch (e) { showToast(e.message, 'error'); }
    }
  });
};

load();
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(console.error);}</script>
</body>
</html>
